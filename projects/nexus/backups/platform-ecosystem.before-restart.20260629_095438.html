<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS | Platform Ecosystem</title>

<link rel="stylesheet" href="../assets/css/style.css">

<style>

:root{
--bg:#050b14;
--panel:#091423;
--line:rgba(255,255,255,.10);
--text:#ffffff;
--muted:#9fb0c7;
--blue:#39b9ff;
--green:#35d16f;
}

body{
margin:0;
font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
background:
radial-gradient(circle at top right,rgba(38,138,255,.20),transparent 35%),
#050b14;
color:var(--text);
}

.wrapper{
max-width:1280px;
margin:auto;
padding:60px 40px 100px;
}

.kicker{
color:var(--blue);
font-size:12px;
letter-spacing:.22em;
font-weight:800;
text-transform:uppercase;
margin-bottom:18px;
}

h1{
font-size:74px;
line-height:.92;
margin:0 0 30px;
letter-spacing:-.05em;
}

.lead{
max-width:900px;
font-size:22px;
line-height:1.7;
color:var(--muted);
margin-bottom:70px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:24px;
padding:30px;
}

.label{
font-size:11px;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--blue);
font-weight:800;
margin-bottom:18px;
}

.card h2{
margin:0 0 18px;
font-size:30px;
}

.card p{
margin:0;
color:var(--muted);
line-height:1.7;
}

.status{
margin-top:28px;
display:grid;
gap:10px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 14px;
background:rgba(255,255,255,.04);
border-radius:10px;
font-size:14px;
}

.ok{
color:var(--green);
font-weight:700;
}

.section{
margin-top:90px;
}

.section h2{
font-size:42px;
margin-bottom:28px;
}

.flow{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:16px;
}

.step{
background:var(--panel);
border:1px solid var(--line);
border-radius:18px;
padding:20px;
}

.step span{
display:block;
font-size:11px;
letter-spacing:.16em;
color:var(--blue);
margin-bottom:12px;
font-weight:800;
text-transform:uppercase;
}

.step strong{
display:block;
font-size:18px;
margin-bottom:12px;
}

.step p{
font-size:14px;
line-height:1.6;
color:var(--muted);
}

.footer-box{
margin-top:70px;
background:#08101c;
border:1px solid var(--line);
padding:34px;
border-radius:24px;
}

.footer-box h3{
margin-top:0;
font-size:30px;
}

.footer-box p{
color:var(--muted);
line-height:1.8;
}

@media(max-width:1000px){

.grid{
grid-template-columns:1fr;
}

.flow{
grid-template-columns:1fr;
}

h1{
font-size:54px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="kicker">
PLATFORM ECOSYSTEM
</div>

<h1>
Architecture.<br>
Capability.<br>
Operational Delivery.
</h1>

<p class="lead">

Rather than exposing proprietary repositories, NEXUS presents the operating architecture that converts financial crime analytics into reusable operational intelligence.

</p>
