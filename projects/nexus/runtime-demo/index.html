<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >
    <meta
        http-equiv="refresh"
        content="0; url=runtime/manufacturing/products/tbml001-ccf3770d8b_TBML001_FC01_RUNTIME_PRODUCT.html"
    >
    <title>First Runtime Demonstration · NEXUS</title>
    <link
        rel="canonical"
        href="runtime/manufacturing/products/tbml001-ccf3770d8b_TBML001_FC01_RUNTIME_PRODUCT.html"

<style id="stage429-runtime-demo-motion-layer">
    /*
     * Stage429 public runtime demonstration motion layer.
     *
     * Presentation-only classes are assigned by the public wrapper.
     * No manufactured FC01 runtime product is altered.
     */

    html.stage429-runtime-motion-ready {
        scroll-behavior: smooth;
    }

    body.stage429-runtime-motion-page {
        opacity: 0;
        transform: translateY(6px);
    }

    body.stage429-runtime-motion-page.stage429-runtime-motion-visible {
        animation:
            stage429-runtime-page-reveal
            620ms
            cubic-bezier(.22, .72, .24, 1)
            forwards;
    }

    .stage429-runtime-graph-target {
        position: relative;
        opacity: 0;
        transform:
            translateY(12px)
            scale(0.985);
        filter: blur(2px);
        transition:
            opacity 720ms ease,
            transform 820ms cubic-bezier(.2, .72, .24, 1),
            filter 720ms ease;
    }

    .stage429-runtime-graph-target.stage429-runtime-graph-visible {
        opacity: 1;
        transform:
            translateY(0)
            scale(1);
        filter: none;
    }

    .stage429-runtime-graph-target::after {
        content: "";
        position: absolute;
        z-index: 5;
        inset: 0;
        pointer-events: none;
        background:
            linear-gradient(
                100deg,
                transparent 18%,
                rgba(94, 218, 241, 0.09) 47%,
                transparent 72%
            );
        opacity: 0;
        transform: translateX(-65%);
    }

    .stage429-runtime-graph-target.stage429-runtime-graph-visible::after {
        animation:
            stage429-runtime-graph-scan
            1050ms
            120ms
            ease-out
            both;
    }

    .stage429-runtime-graph-edge {
        stroke-dasharray:
            var(--stage429-edge-length, 700);
        stroke-dashoffset:
            var(--stage429-edge-length, 700);
        animation:
            stage429-runtime-edge-draw
            780ms
            ease-out
            forwards;
    }

    .stage429-runtime-graph-node {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        animation:
            stage429-runtime-node-arrive
            420ms
            cubic-bezier(.2, .78, .24, 1)
            forwards;
    }

    .stage429-runtime-score-value {
        display: inline-block;
        min-width: 2ch;
        font-variant-numeric: tabular-nums;
    }

    .stage429-runtime-score-counting {
        color: inherit;
        text-shadow:
            0 0 10px
            rgba(69, 198, 232, 0.14);
    }

    .stage429-runtime-section-target {
        opacity: 0;
        transform: translateY(16px);
        transition:
            opacity 560ms ease,
            transform 620ms cubic-bezier(.2, .72, .24, 1);
    }

    .stage429-runtime-section-target.stage429-runtime-section-visible {
        opacity: 1;
        transform: translateY(0);
    }

    @keyframes stage429-runtime-page-reveal {
        from {
            opacity: 0;
            transform: translateY(6px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes stage429-runtime-graph-scan {
        0% {
            opacity: 0;
            transform: translateX(-65%);
        }

        28% {
            opacity: 1;
        }

        100% {
            opacity: 0;
            transform: translateX(65%);
        }
    }

    @keyframes stage429-runtime-edge-draw {
        to {
            stroke-dashoffset: 0;
        }
    }

    @keyframes stage429-runtime-node-arrive {
        from {
            opacity: 0;
            transform:
                translateY(5px)
                scale(0.96);
        }

        to {
            opacity: 1;
            transform:
                translateY(0)
                scale(1);
        }
    }

    @media (prefers-reduced-motion: reduce) {
        html.stage429-runtime-motion-ready {
            scroll-behavior: auto;
        }

        body.stage429-runtime-motion-page,
        body.stage429-runtime-motion-page.stage429-runtime-motion-visible,
        .stage429-runtime-graph-target,
        .stage429-runtime-graph-target.stage429-runtime-graph-visible,
        .stage429-runtime-section-target,
        .stage429-runtime-section-target.stage429-runtime-section-visible,
        .stage429-runtime-graph-edge,
        .stage429-runtime-graph-node {
            opacity: 1;
            transform: none;
            filter: none;
            animation: none;
            transition: none;
            stroke-dashoffset: 0;
        }

        .stage429-runtime-graph-target::after {
            display: none;
        }
    }
</style>

<script id="stage429-runtime-demo-motion-controller">
    (() => {
        "use strict";

        const GRAPH_STRATEGY = "container_reveal";

        const normalise = (value) =>
            String(value || "")
                .replace(/\s+/g, " ")
                .trim()
                .toLowerCase();

        const reducedMotion = () =>
            window.matchMedia(
                "(prefers-reduced-motion: reduce)"
            ).matches;

        const elementText = (element) =>
            normalise(
                element &&
                element.textContent
            );

        const boundedAncestors = (
            element,
            maximumDepth = 8
        ) => {
            const result = [];
            let current = element;
            let depth = 0;

            while (
                current &&
                current !== document.body &&
                depth < maximumDepth
            ) {
                result.push(current);
                current = current.parentElement;
                depth += 1;
            }

            return result;
        };

        const findExactTextElement = (wanted) => {
            const target = normalise(wanted);

            return Array.from(
                document.querySelectorAll(
                    [
                        "h1",
                        "h2",
                        "h3",
                        "h4",
                        "h5",
                        "p",
                        "span",
                        "strong",
                        "b",
                        "div"
                    ].join(",")
                )
            ).find(
                (element) =>
                    elementText(element) === target
            ) || null;
        };

        const findGraphTarget = () => {
            const embedded =
                document.querySelector(
                    "iframe, object, embed, canvas"
                );

            if (embedded) {
                return (
                    embedded.closest(
                        [
                            "section",
                            "article",
                            "main",
                            ".panel",
                            ".card",
                            "div"
                        ].join(",")
                    ) ||
                    embedded
                );
            }

            const inlineSvg =
                document.querySelector("svg");

            if (inlineSvg) {
                return (
                    inlineSvg.closest(
                        [
                            "section",
                            "article",
                            ".panel",
                            ".card",
                            "div"
                        ].join(",")
                    ) ||
                    inlineSvg
                );
            }

            const markers = [
                "Canonical Graph Engine Output",
                "Visual Intelligence Model",
                "Canonical Graph"
            ];

            for (const marker of markers) {
                const element =
                    findExactTextElement(marker);

                if (!element) {
                    continue;
                }

                const candidate =
                    boundedAncestors(element)
                        .find((ancestor) => {
                            const text =
                                elementText(ancestor);

                            const childCount =
                                ancestor
                                    .querySelectorAll("*")
                                    .length;

                            return (
                                text.includes(
                                    normalise(marker)
                                ) &&
                                childCount >= 4 &&
                                childCount <= 220
                            );
                        });

                if (candidate) {
                    return candidate;
                }
            }

            return null;
        };

        const revealGraph = (graphTarget) => {
            if (!graphTarget) {
                return;
            }

            graphTarget.classList.add(
                "stage429-runtime-graph-target"
            );

            let revealed = false;

            const show = () => {
                if (revealed) {
                    return;
                }

                revealed = true;

                window.requestAnimationFrame(() => {
                    graphTarget.classList.add(
                        "stage429-runtime-graph-visible"
                    );
                });
            };

            const iframe =
                graphTarget.matches("iframe")
                    ? graphTarget
                    : graphTarget.querySelector("iframe");

            if (
                GRAPH_STRATEGY ===
                    "iframe_load_reveal" &&
                iframe
            ) {
                iframe.addEventListener(
                    "load",
                    show,
                    { once: true }
                );

                window.setTimeout(
                    show,
                    600
                );

                return;
            }

            window.setTimeout(
                show,
                180
            );
        };

        const animateInlineGraph = () => {
            const svg =
                document.querySelector("svg");

            if (!svg || reducedMotion()) {
                return;
            }

            const edges = Array.from(
                svg.querySelectorAll(
                    "path, line, polyline"
                )
            ).filter((element) => {
                const style =
                    window.getComputedStyle(element);

                return (
                    style.stroke !== "none" &&
                    style.strokeWidth !== "0px"
                );
            });

            edges
                .slice(0, 80)
                .forEach((edge, index) => {
                    let length = 700;

                    try {
                        if (
                            typeof edge.getTotalLength ===
                            "function"
                        ) {
                            length = Math.max(
                                1,
                                edge.getTotalLength()
                            );
                        }
                    } catch (error) {
                        length = 700;
                    }

                    edge.style.setProperty(
                        "--stage429-edge-length",
                        String(length)
                    );

                    edge.style.animationDelay =
                        `${Math.min(
                            index * 26,
                            620
                        )}ms`;

                    edge.classList.add(
                        "stage429-runtime-graph-edge"
                    );
                });

            const nodes = Array.from(
                svg.querySelectorAll(
                    [
                        "g",
                        "rect",
                        "circle",
                        "ellipse",
                        "polygon"
                    ].join(",")
                )
            ).filter((element) => {
                if (
                    element.closest(
                        "defs, marker, clipPath, mask"
                    )
                ) {
                    return false;
                }

                const text =
                    elementText(element);

                const children =
                    element
                        .querySelectorAll("*")
                        .length;

                return (
                    text.length > 0 ||
                    children >= 1
                );
            });

            nodes
                .slice(0, 40)
                .forEach((node, index) => {
                    node.style.animationDelay =
                        `${
                            220 +
                            Math.min(
                                index * 55,
                                1100
                            )
                        }ms`;

                    node.classList.add(
                        "stage429-runtime-graph-node"
                    );
                });
        };

        const extractScoreValue = (container) => {
            const candidates = Array.from(
                container.querySelectorAll(
                    "strong, b, span, div, p"
                )
            );

            for (const candidate of candidates) {
                const original =
                    String(candidate.textContent || "")
                        .trim();

                const match = original.match(
                    /(^|[^\d])(\d{1,3})(?:\s*%)?($|[^\d])/
                );

                if (!match) {
                    continue;
                }

                const value = Number(match[2]);

                if (
                    Number.isFinite(value) &&
                    value >= 0 &&
                    value <= 100
                ) {
                    return {
                        element: candidate,
                        value,
                        original
                    };
                }
            }

            return null;
        };

        const findScoreContainer = (label) => {
            const labelElement =
                findExactTextElement(label);

            if (!labelElement) {
                return null;
            }

            for (
                const ancestor
                of boundedAncestors(labelElement)
            ) {
                const text =
                    elementText(ancestor);

                const childCount =
                    ancestor
                        .querySelectorAll("*")
                        .length;

                if (
                    text.includes(normalise(label)) &&
                    childCount >= 1 &&
                    childCount <= 45 &&
                    /\d/.test(text)
                ) {
                    return ancestor;
                }
            }

            return labelElement.parentElement;
        };

        const countScore = (
            element,
            finalValue,
            originalText,
            delay
        ) => {
            if (
                reducedMotion() ||
                element.dataset.stage429Counted === "true"
            ) {
                return;
            }

            element.dataset.stage429Counted = "true";

            element.classList.add(
                "stage429-runtime-score-value",
                "stage429-runtime-score-counting"
            );

            const prefixMatch =
                originalText.match(/^[^\d]*/);

            const suffixMatch =
                originalText.match(/[^\d]*$/);

            const prefix =
                prefixMatch ? prefixMatch[0] : "";

            const suffix =
                suffixMatch ? suffixMatch[0] : "";

            const duration = 760;
            const startAt =
                performance.now() + delay;

            const render = (timestamp) => {
                if (timestamp < startAt) {
                    window.requestAnimationFrame(render);
                    return;
                }

                const progress =
                    Math.min(
                        1,
                        (timestamp - startAt) / duration
                    );

                const eased =
                    1 - Math.pow(1 - progress, 3);

                const value =
                    Math.round(finalValue * eased);

                element.textContent =
                    prefix + value + suffix;

                if (progress < 1) {
                    window.requestAnimationFrame(render);
                    return;
                }

                element.textContent = originalText;

                element.classList.remove(
                    "stage429-runtime-score-counting"
                );
            };

            window.requestAnimationFrame(render);
        };

        const animateScores = () => {
            const labels = [
                "Network Confidence",
                "Confidence Score",
                "Risk Score",
                "Exposure Score"
            ];

            const usedElements = new Set();
            let animationIndex = 0;

            labels.forEach((label) => {
                const container =
                    findScoreContainer(label);

                if (!container) {
                    return;
                }

                const result =
                    extractScoreValue(container);

                if (
                    !result ||
                    usedElements.has(result.element)
                ) {
                    return;
                }

                usedElements.add(result.element);

                countScore(
                    result.element,
                    result.value,
                    result.original,
                    animationIndex * 130
                );

                animationIndex += 1;
            });
        };

        const discoverMajorSections = (
            graphTarget
        ) => {
            const selectors = [
                "main > section",
                "main > article",
                "body > section",
                "body > main > div",
                "section",
                "article"
            ];

            const candidates = [];

            selectors.forEach((selector) => {
                document
                    .querySelectorAll(selector)
                    .forEach((element) => {
                        if (
                            element === graphTarget ||
                            (
                                graphTarget &&
                                graphTarget.contains(element)
                            )
                        ) {
                            return;
                        }

                        const text =
                            elementText(element);

                        const childCount =
                            element
                                .querySelectorAll("*")
                                .length;

                        const box =
                            element.getBoundingClientRect();

                        if (
                            text.length < 35 ||
                            childCount < 2 ||
                            childCount > 450 ||
                            box.height < 48
                        ) {
                            return;
                        }

                        candidates.push(element);
                    });
            });

            return Array.from(
                new Set(candidates)
            ).slice(0, 24);
        };

        const revealSections = (
            graphTarget
        ) => {
            const sections =
                discoverMajorSections(graphTarget);

            if (
                reducedMotion() ||
                !("IntersectionObserver" in window)
            ) {
                sections.forEach((section) => {
                    section.classList.add(
                        "stage429-runtime-section-target",
                        "stage429-runtime-section-visible"
                    );
                });

                return;
            }

            const observer =
                new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (!entry.isIntersecting) {
                                return;
                            }

                            entry.target.classList.add(
                                "stage429-runtime-section-visible"
                            );

                            observer.unobserve(
                                entry.target
                            );
                        });
                    },
                    {
                        threshold: 0.12,
                        rootMargin:
                            "0px 0px -8% 0px"
                    }
                );

            sections.forEach(
                (section, index) => {
                    section.classList.add(
                        "stage429-runtime-section-target"
                    );

                    section.style.transitionDelay =
                        `${Math.min(
                            index * 35,
                            180
                        )}ms`;

                    observer.observe(section);
                }
            );
        };

        const activateRuntimeMotion = () => {
            document.documentElement.classList.add(
                "stage429-runtime-motion-ready"
            );

            document.body.classList.add(
                "stage429-runtime-motion-page"
            );

            const graphTarget =
                findGraphTarget();

            revealGraph(graphTarget);

            if (
                GRAPH_STRATEGY ===
                "inline_graph_reveal"
            ) {
                window.setTimeout(
                    animateInlineGraph,
                    250
                );
            }

            window.setTimeout(
                animateScores,
                390
            );

            revealSections(graphTarget);

            window.requestAnimationFrame(() => {
                window.requestAnimationFrame(() => {
                    document.body.classList.add(
                        "stage429-runtime-motion-visible"
                    );
                });
            });
        };

        if (document.readyState === "loading") {
            document.addEventListener(
                "DOMContentLoaded",
                activateRuntimeMotion,
                { once: true }
            );
        } else {
            activateRuntimeMotion();
        }
    })();
</script>
</head>

    <p>
        Opening the

        </a>.
    </p>
