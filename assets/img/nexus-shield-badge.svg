<svg width="240" height="270" viewBox="0 0 240 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blueGlow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#19bfff" stop-opacity="0.9"/>
      <stop offset="48%" stop-color="#0b3f7a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#020711" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8e29a"/>
      <stop offset="35%" stop-color="#b88932"/>
      <stop offset="65%" stop-color="#fff0b8"/>
      <stop offset="100%" stop-color="#8b5f20"/>
    </linearGradient>

    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8eef7"/>
      <stop offset="35%" stop-color="#6c7786"/>
      <stop offset="65%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#2a3340"/>
    </linearGradient>

    <linearGradient id="blueChrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36d7ff"/>
      <stop offset="45%" stop-color="#0b5ab8"/>
      <stop offset="100%" stop-color="#001b3d"/>
    </linearGradient>

    <filter id="outerGlow">
