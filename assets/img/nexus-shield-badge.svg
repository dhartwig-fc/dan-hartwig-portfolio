      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="240" height="270" fill="transparent"/>
  <ellipse cx="120" cy="126" rx="110" ry="118" fill="url(#blueGlow)" opacity="0.9"/>

