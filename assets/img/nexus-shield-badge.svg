  <g opacity="0.55" stroke="#22c7ff" stroke-width="1.4">
    <line x1="120" y1="42" x2="120" y2="202"/>
    <line x1="70" y1="80" x2="170" y2="80"/>
    <line x1="70" y1="132" x2="170" y2="132"/>
    <line x1="78" y1="173" x2="162" y2="58"/>
